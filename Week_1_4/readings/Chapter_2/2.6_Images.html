2.6 Images 
The <img> element is a void element that displays an image in a webpage. 
The <img> element has two required attributes:

- The src attribute specifies the URL of the image file to display. 
- The alt attribute provides a text description to 
    use as an alternative to displaying the image. 

exemple:
<img src="https://example.com/family.jpg" alt="Smith family reunion"> displays the image family.jpg, but the text "Smith family reunion" displays if the image cannot be displayed.
-->
